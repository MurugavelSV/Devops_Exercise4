name: React App CICD

on:
  push:
    branches:
      - main
      - dev

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.0 

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm i

      - name: Compile project
        run: npm run build

      - name: Upload the built file
        uses: actions/upload-artifact@v6.0.0
        with:
           name: react build
           path: ./dist

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm i

      - name: Download the build file
        uses: actions/download-artifact@v7.0.0
        with:
          name: react build
          path: dist

      - name: Check for build file existence
        run: |
          test -f dist/index.html
          echo "Build file exists"

      - name: Run tests
        run: npm test -- --watchAll=false


  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.0
    
      - name: Build docker image
        run: docker build -t reactapp:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Print Main environment variables
        if: github.ref_name == 'main'
        run: |
          echo "Deploying to Main"
          echo "API_URL=${{ vars.PROD_API_URL }}"
          echo "DB_NAME=${{ vars.PROD_DB_NAME }}"

      - name: Print development environment variables
        if: github.ref_name == 'dev'
        run: |
          echo "Deploying to DEVELOPMENT"
          echo "API_URL=${{ vars.DEV_API_URL }}"
          echo "DB_NAME=${{ vars.DEV_DB_NAME }}"


